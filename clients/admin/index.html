<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts — only the steady-state three are loaded eagerly:
         Figtree (body), Outfit (display), JetBrains Mono (mono/code).
         The other nine selectable families are lazy-injected by the
         theme provider when the user opens Settings → Appearance, so
         we don't pay 200-400 KB of font CSS on every cold load. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Figtree:wght@300..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&family=Outfit:wght@100..900&display=swap"
    />

    <!--
      Theme + appearance bootstrap — runs synchronously before React mounts so
      first paint matches the user's stored preferences. Any async load
      reintroduces FOUC, so this MUST stay inline. Admin namespaces its prefs
      under `fsh.admin.*` so they never collide with the dashboard app.
    -->
    <script>
      (function () {
        var SHARED_FALLBACKS =
          "ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif";
        var FONT_FAMILIES = {
          geist: "'Geist', " + SHARED_FALLBACKS,
          "inter-tight": "'Inter Tight', " + SHARED_FALLBACKS,
          "dm-sans": "'DM Sans', " + SHARED_FALLBACKS,
          "ibm-plex": "'IBM Plex Sans', " + SHARED_FALLBACKS,
          manrope: "'Manrope', " + SHARED_FALLBACKS,
          "plus-jakarta": "'Plus Jakarta Sans', " + SHARED_FALLBACKS,
          outfit: "'Outfit', " + SHARED_FALLBACKS,
          sora: "'Sora', " + SHARED_FALLBACKS,
          lexend: "'Lexend', " + SHARED_FALLBACKS,
          figtree: "'Figtree', " + SHARED_FALLBACKS,
          onest: "'Onest', " + SHARED_FALLBACKS,
          "roboto-flex": "'Roboto Flex', " + SHARED_FALLBACKS,
        };
        // Fonts loaded eagerly in the markup above; everything else is
        // lazy-injected. If the user has picked a non-eager body font,
        // we inject the lazy bundle here so first paint doesn't fall
        // back to the system font.
        var EAGER_FONTS = { figtree: 1, outfit: 1, "jetbrains-mono": 1 };
        var LAZY_FONTS_HREF =
          "https://fonts.googleapis.com/css2?" +
          [
            "family=DM+Sans:opsz,wght@9..40,100..1000",
            "family=Geist:wght@100..900",
            "family=IBM+Plex+Sans:wght@100;200;300;400;500;600;700",
            "family=Inter+Tight:wght@100..900",
            "family=Lexend:wght@100..900",
            "family=Manrope:wght@200..800",
            "family=Onest:wght@100..900",
            "family=Plus+Jakarta+Sans:wght@200..800",
            "family=Roboto+Flex:opsz,wght@8..144,100..1000",
            "family=Sora:wght@100..800",
            "display=swap",
          ].join("&");
        var ACCENTS = ["rose", "indigo", "violet", "sky", "emerald", "amber"];

        try {
          // Theme.
          var stored = localStorage.getItem("fsh.admin.theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var resolved = stored === "dark" || stored === "light"
            ? stored
            : prefersDark ? "dark" : "light";
          if (resolved === "dark") document.documentElement.classList.add("dark");

          // Font — set --font-sans on :root.
          var savedFont = localStorage.getItem("fsh.admin.font");
          if (savedFont && FONT_FAMILIES[savedFont]) {
            document.documentElement.style.setProperty("--font-sans", FONT_FAMILIES[savedFont]);
            // Inject the lazy font bundle synchronously if the user has
            // picked a body font not in the eager set, so the chosen
            // typeface is available before first paint.
            if (!EAGER_FONTS[savedFont]) {
              var lazyLink = document.createElement("link");
              lazyLink.rel = "stylesheet";
              lazyLink.id = "fsh-lazy-fonts";
              lazyLink.href = LAZY_FONTS_HREF;
              document.head.appendChild(lazyLink);
            }
          }

          // Accent — toggle accent-{id} class on :root. Rose is the
          // baseline (no class needed) and matches the warm-paper default.
          var savedAccent = localStorage.getItem("fsh.admin.accent");
          if (savedAccent && savedAccent !== "rose" && ACCENTS.indexOf(savedAccent) !== -1) {
            document.documentElement.classList.add("accent-" + savedAccent);
          }

          // Density — toggle density-compact class on :root.
          if (localStorage.getItem("fsh.admin.density") === "compact") {
            document.documentElement.classList.add("density-compact");
          }
        } catch (_) {
          /* localStorage may be unavailable (privacy mode). Fall back to defaults. */
        }
        // Mark the document so post-mount transitions are allowed; the
        // inline class flip above is exempt from animation.
        requestAnimationFrame(function () {
          document.documentElement.classList.add("theme-ready");
        });
      })();
    </script>
    <title>FullStackHero — Admin</title>
  </head>
  <body class="h-full bg-background text-foreground antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
