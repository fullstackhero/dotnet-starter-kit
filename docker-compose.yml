services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fsh
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "waiting for minio..."
          sleep 2
        done
        mc mb --ignore-existing local/fsh-uploads
        mc anonymous set download local/fsh-uploads

  api:
    build:
      context: .
      dockerfile: src/Playground/FSH.Starter.Api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DatabaseOptions__ConnectionString: "Host=postgres;Port=5432;Database=fsh;Username=postgres;Password=password"
      CachingOptions__Redis: "redis:6379"
      Storage__Provider: s3
      Storage__S3__Bucket: fsh-uploads
      Storage__S3__Region: us-east-1
      Storage__S3__ServiceUrl: http://minio:9000
      Storage__S3__AccessKey: minioadmin
      Storage__S3__SecretKey: minioadmin
      Storage__S3__ForcePathStyle: "true"
      Storage__S3__PublicBaseUrl: http://localhost:9000/fsh-uploads

  otel-collector:
    image: otel/opentelemetry-collector:latest
    ports:
      - "4317:4317"

volumes:
  postgres-data:
  minio-data:
