# Local-dev compose: the whole stack on one host with throwaway secrets.
# Aspire (src/Host/FSH.Starter.AppHost) is the richer local-dev path;
# deploy/docker/ is the production compose. Use this for a quick container
# run of API + infra. Secrets below are DEV-ONLY — never reuse them.
services:
  postgres:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fsh
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint: /bin/sh
    command:
      - -c
      - |
        until mc alias set local http://minio:9000 minioadmin minioadmin; do
          echo "waiting for minio..."
          sleep 2
        done
        mc mb --ignore-existing local/fsh-uploads
        mc anonymous set download local/fsh-uploads

  # One-shot: apply EF migrations + seed the root tenant and admin user.
  # The DB is NOT migrated at API startup, so without this the API runs
  # against an empty schema. Mirrors deploy/docker's migrator.
  migrator:
    build:
      context: .
      dockerfile: src/Host/FSH.Starter.DbMigrator/Dockerfile
    depends_on:
      postgres:
        condition: service_started
    environment:
      DOTNET_ENVIRONMENT: Development
      DatabaseOptions__ConnectionString: "Host=postgres;Port=5432;Database=fsh;Username=postgres;Password=password"
      CachingOptions__Redis: "redis:6379"
      JwtOptions__SigningKey: "dev-only-jwt-signing-key-change-me-32-chars-min"
      Seed__DefaultAdminPassword: "Admin123!"
    command: ["apply", "--seed"]

  api:
    build:
      context: .
      dockerfile: src/Host/FSH.Starter.Api/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      migrator:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      DatabaseOptions__ConnectionString: "Host=postgres;Port=5432;Database=fsh;Username=postgres;Password=password"
      CachingOptions__Redis: "redis:6379"
      JwtOptions__SigningKey: "dev-only-jwt-signing-key-change-me-32-chars-min"
      Seed__DefaultAdminPassword: "Admin123!"
      Storage__Provider: s3
      Storage__S3__Bucket: fsh-uploads
      Storage__S3__Region: us-east-1
      Storage__S3__ServiceUrl: http://minio:9000
      Storage__S3__AccessKey: minioadmin
      Storage__S3__SecretKey: minioadmin
      Storage__S3__ForcePathStyle: "true"
      Storage__S3__PublicBaseUrl: http://localhost:9000/fsh-uploads

  otel-collector:
    image: otel/opentelemetry-collector:latest
    ports:
      - "4317:4317"

volumes:
  postgres-data:
  minio-data:
